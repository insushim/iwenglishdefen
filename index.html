<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="셀디펜더">
  <meta name="theme-color" content="#0d0a1a">
  <meta name="description" content="셀 디펜더 - 세포 디펜스 + 영단어 학습 슈팅 게임">
  <meta property="og:title" content="셀 디펜더 - Cell Defender">
  <meta property="og:description" content="세포를 지키며 영단어를 배우는 디펜스 슈팅 게임">
  <meta property="og:image" content="/icons/og-image.png">
  <meta property="og:type" content="website">
  <title>셀 디펜더 - Cell Defender</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <div id="installBanner" class="hidden">
      <span>홈 화면에 추가하여 앱처럼 사용하세요!</span>
      <button id="installBtn">설치</button>
      <button id="dismissBtn">닫기</button>
    </div>
    <div id="updateBanner" class="hidden">
      <span>새 버전이 있습니다!</span>
      <button id="updateBtn">업데이트</button>
    </div>
  </div>
  <script src="/js/vocab.js"></script>
  <script src="/js/game.js"></script>
  <script>
    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.remove('hidden');
    });
    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBanner').classList.add('hidden');
      }
    });
    document.getElementById('dismissBtn')?.addEventListener('click', () => {
      document.getElementById('installBanner').classList.add('hidden');
    });

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
              document.getElementById('updateBanner').classList.remove('hidden');
            }
          });
        });
      });
      document.getElementById('updateBtn')?.addEventListener('click', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
